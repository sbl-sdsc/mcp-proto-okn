    const isLabeled = labeledSet.has(p.sym);
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', sx(p.lfc30));
    circle.setAttribute('cy', sy(p.lfc60));
    circle.setAttribute('r', isLabeled ? 3.5 : 2.2);
    circle.setAttribute('fill', colors[c]);
    circle.setAttribute('opacity', isLabeled ? 0.95 : 0.5);
    if (isLabeled) {
      circle.setAttribute('stroke', 'var(--color-background-primary)');
      circle.setAttribute('stroke-width', '0.8');
    }
    svg.appendChild(circle);
  }

  const placed = [];
  const labelEntries = Object.entries(DATA.labels)
    .map(([sym, cats]) => {
      const pt = DATA.pts.find(q => q.sym === sym);
      return pt ? {sym, cats, x: sx(pt.lfc30), y: sy(pt.lfc60), pt} : null;
    })
    .filter(Boolean);
  labelEntries.sort((a,b) => Math.hypot(b.pt.lfc30, b.pt.lfc60) - Math.hypot(a.pt.lfc30, a.pt.lfc60));

  const charW = 6.2, labelH = 12;
  const candidates = [
    [10, -2, 'start'], [-10, -2, 'end'], [0, -10, 'middle'], [0, 16, 'middle'],
    [10, -10, 'start'], [-10, -10, 'end'], [10, 14, 'start'], [-10, 14, 'end'],
    [16, -2, 'start'], [-16, -2, 'end'], [0, -16, 'middle'], [0, 22, 'middle'],
  ];
  function rectsOverlap(a, b) {
    return !(a.x+a.w < b.x || b.x+b.w < a.x || a.y+a.h < b.y || b.y+b.h < a.y);
  }
  function bboxFor(text, x, y, anchor) {
    const w = text.length * charW;
    let bx = x;
    if (anchor === 'middle') bx = x - w/2;
    else if (anchor === 'end') bx = x - w;
    return {x: bx, y: y - labelH + 2, w, h: labelH + 2};
  }
  const PB = {x: M.left+2, y: M.top+2, w: PW-4, h: PH-4};
  function inPlot(b) {
    return b.x >= PB.x && b.y >= PB.y && b.x + b.w <= PB.x + PB.w && b.y + b.h <= PB.y + PB.h;
  }

  for (const e of labelEntries) {
    const isDiscord = e.cats.includes('discord');
    let chosen = null;
    for (const [dx, dy, anchor] of candidates) {
      const tx = e.x + dx, ty = e.y + dy;
      const b = bboxFor(e.sym, tx, ty, anchor);
      if (!inPlot(b)) continue;
      let ok = true;
      for (const pl of placed) if (rectsOverlap({x:b.x-1, y:b.y-1, w:b.w+2, h:b.h+2}, pl)) { ok = false; break; }
      if (ok) { chosen = {tx, ty, anchor, b}; break; }
    }
    if (!chosen) {
      const ang = Math.atan2(e.pt.lfc60 || 0.01, e.pt.lfc30 || 0.01);
      for (let r = 22; r <= 60; r += 8) {
        const tx = e.x + Math.cos(ang) * r;
        const ty = e.y - Math.sin(ang) * r;
        const anchor = Math.cos(ang) > 0 ? 'start' : 'end';
        const b = bboxFor(e.sym, tx, ty, anchor);
        if (!inPlot(b)) continue;
        let ok = true;
        for (const pl of placed) if (rectsOverlap({x:b.x-1,y:b.y-1,w:b.w+2,h:b.h+2}, pl)) { ok=false; break; }
        if (ok) { chosen = {tx, ty, anchor, b}; break; }
      }
    }
    if (!chosen) continue;
    placed.push(chosen.b);

    const leaderDist = Math.hypot(chosen.tx - e.x, chosen.ty - e.y);
    if (leaderDist > 12) {
      const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('x1', e.x); ln.setAttribute('y1', e.y);
      ln.setAttribute('x2', chosen.tx); ln.setAttribute('y2', chosen.ty + 3);
      ln.setAttribute('stroke', 'var(--color-text-tertiary)');
      ln.setAttribute('stroke-width','0.4');
      ln.setAttribute('opacity','0.7');
      svg.appendChild(ln);
    }

    const labelTxt = document.createElementNS('http://www.w3.org/2000/svg','text');
    labelTxt.setAttribute('x', chosen.tx);
    labelTxt.setAttribute('y', chosen.ty);
    labelTxt.setAttribute('text-anchor', chosen.anchor);
    labelTxt.setAttribute('font-size','11');
    labelTxt.setAttribute('font-style','italic');
    labelTxt.setAttribute('font-family','var(--font-sans)');
    labelTxt.setAttribute('fill', isDiscord ? '#993C1D' : 'var(--color-text-primary)');
    if (isDiscord) labelTxt.setAttribute('font-weight','500');
    labelTxt.textContent = e.sym;
    svg.appendChild(labelTxt);
  }

  document.getElementById('plot-host').appendChild(svg);
})();
</script>
